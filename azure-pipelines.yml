trigger:
- main

pool:
  vmImage: ubuntu-latest

jobs:
# --- BLOCK 1: CONTINUOUS INTEGRATION (CI) ---
- job: Build
  displayName: 'CI: Build Application'
  steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '20.x'
    displayName: 'Install Node.js'

  - script: |
      npm install
      npm run build
    displayName: 'npm install and build'

# --- BLOCK 2: CONTINUOUS DELIVERY (CD) ---
- job: Deploy
  displayName: 'CD: Deploy to Portal'
  dependsOn: Build                   
  condition: succeeded()             
  steps:
  - task: AzureRmWebAppDeployment@4
    displayName: 'Deploy to Azure Web App'
    inputs:
      ConnectionType: 'AzureRM'
      azureSubscription: 'azure-web-app-connection'
      WebAppName: 'mycdpipe'
      Package: '$(System.DefaultWorkingDirectory)'
