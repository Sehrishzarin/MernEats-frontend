trigger:
- main

pool:
  vmImage: ubuntu-latest

stages:
# --- STAGE 1: CONTINUOUS INTEGRATION (CI) ---
- stage: CI_Build
  displayName: 'CI: Build Application'
  jobs:
  - job: RunNpmBuild
    displayName: 'Compile Node Project'
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'
      displayName: 'Install Node.js'

    - script: |
        npm install
        npm run build
      displayName: 'npm install and build'

# --- STAGE 2: CONTINUOUS DELIVERY (CD) ---
- stage: CD_Deploy
  displayName: 'CD: Deploy to Portal'
  dependsOn: CI_Build           
  condition: succeeded()          
  jobs:
  - job: ExecuteDeploy
    displayName: 'Push to Azure Web App'
    steps:
    - task: AzureRmWebAppDeployment@4
      displayName: 'Deploy to Azure Web App'
      inputs:
        ConnectionType: 'AzureRM'
        azureSubscription: 'azure-web-app-connection'
        WebAppName: 'mycdpipe'
        Package: '$(System.DefaultWorkingDirectory)'
