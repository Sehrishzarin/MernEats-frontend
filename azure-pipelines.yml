trigger:
- main

variables:
  # 1. This matches your service connection name
  azureServiceConnection: 'azure-web-app-connection'
  
  # 2. REPLACE THIS: Put your exact Azure Portal Web App name here
  webAppName: 'YOUR_ACTUAL_AZURE_WEB_APP_NAME'
  
  vmImageName: 'ubuntu-latest'

stages:
- stage: Build
  displayName: 'CI Stage: Build Node App'
  jobs:
  - job: Build
    pool:
      vmImage: $(vmImageName)
    steps:
    
    # === YOUR EXACT CODE STARTS HERE ===
    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'
      displayName: 'Install Node.js'

    - script: |
        npm install
        npm run build
      displayName: 'npm install and build'
    # === YOUR EXACT CODE ENDS HERE ===

    # New step: Packages the output of 'npm run build' into a zip
    - task: ArchiveFiles@2
      displayName: 'Archive files into a deployable zip'
      inputs:
        rootFolderOrFile: '$(System.DefaultWorkingDirectory)'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'
        replaceExistingArchive: true

    # New step: Uploads that zip so the deploy stage can grab it
    - task: PublishBuildArtifacts@1
      displayName: 'Upload artifact to pipeline storage'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'
        ArtifactName: 'drop'

- stage: Deploy
  displayName: 'CD Stage: Deploy to Azure Web App'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: Deploy
    pool:
      vmImage: $(vmImageName)
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          # Pulls down the zip archive built right above
          - task: DownloadBuildArtifacts@0
            inputs:
              buildType: 'current'
              downloadType: 'single'
              artifactName: 'drop'
              downloadPath: '$(System.ArtifactsDirectory)'

          # Safely streams the zip directly into your Azure Web App
          - task: AzureRmWebAppDeployment@4
            displayName: 'Stream Zip to Azure Web App'
            inputs:
              ConnectionType: 'AzureRM'
              azureSubscription: '$(azureServiceConnection)'
              appType: 'webAppLinux' # Keep as webAppLinux if your Azure App Service is Linux
              WebAppName: '$(webAppName)'
              Package: '$(System.ArtifactsDirectory)/drop/$(Build.BuildId).zip'
